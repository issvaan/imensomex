<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMENSO | Official Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --surface2: #1a1a1a;
            --border: #2a2a2a;
            --white: #f5f5f0;
            --muted: #666666;
            --accent: #c9a84c;
            --accent-light: #e8c96a;
            --font-display: 'Bebas Neue', sans-serif;
            --font-mono: 'DM Mono', monospace;
            --font-body: 'Inter', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--white); font-family: var(--font-body); line-height: 1.6; overflow-x: hidden; }
        
        /* Estilos de navegación y Hero similares a tu diseño anterior */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 18px 5%; position: fixed; width: 100%; top: 0; background: rgba(10,10,10,0.92); backdrop-filter: blur(20px); z-index: 1000; border-bottom: 1px solid var(--border); }
        .nav-logo img { height: 36px; cursor: pointer; filter: brightness(0) invert(1); }
        .nav-right { display: flex; align-items: center; gap: 24px; }
        .nav-tag { font-size: 9px; letter-spacing: 3px; color: var(--muted); font-family: var(--font-mono); }

        .hero { padding: 160px 5% 60px; position: relative; }
        .hero h1 { font-family: var(--font-display); font-size: clamp(70px, 12vw, 130px); line-height: 0.85; }
        .hero h1 span { color: var(--accent); }

        .filter-bar { display: flex; gap: 8px; padding: 16px 5%; background: var(--surface); position: sticky; top: 73px; z-index: 900; overflow-x: auto; border-bottom: 1px solid var(--border); }
        .filter-btn { padding: 8px 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); border-radius: 2px; font-size: 10px; cursor: pointer; font-family: var(--font-mono); letter-spacing: 2px; }
        .filter-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1px; background: var(--border); }
        .product-card { background: var(--surface); padding: 28px 24px 22px; cursor: pointer; transition: all 0.3s ease; position: relative; }
        .product-img-wrap { width: 100%; height: 200px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .product-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .product-name { font-family: var(--font-display); font-size: 28px; color: var(--white); }
        .product-price { color: var(--accent); font-family: var(--font-mono); font-size: 20px; }

        /* Overlay de Detalle mejorado */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; overflow-y: auto; }
        .overlay-nav { position: fixed; top: 0; width: 100%; padding: 18px 5%; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; z-index: 2100; }
        .detail-wrap { max-width: 1100px; margin: 0 auto; padding: 120px 5% 80px; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; }
        .buy-now { display: block; background: var(--accent); color: var(--bg); padding: 20px; text-align: center; text-decoration: none; font-family: var(--font-display); font-size: 22px; margin-top: 30px; border-radius: 3px; }

        @media (max-width: 768px) { .detail-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo" onclick="window.location.reload()">
        <img src="IMENSO%20BLANCO.jpg" alt="IMENSO">
    </div>
    <div class="nav-right">
        <span class="nav-tag">MÉXICO OFFICIAL STORE</span>
    </div>
</nav>

<header class="hero">
    <div class="hero-label">PREMIUM TECHNOLOGY</div>
    <h1>AUDIO<br>&amp; <span>POWER</span></h1>
</header>

<div class="filter-bar">
    <button class="filter-btn active" onclick="filter('todos', this)">TODOS</button>
    <button class="filter-btn" onclick="filter('audifonos', this)">AUDÍFONOS</button>
    <button class="filter-btn" onclick="filter('power', this)">POWER BANKS</button>
    <button class="filter-btn" onclick="filter('bocinas', this)">BOCINAS</button>
</div>

<main class="products-grid" id="grid"></main>

<div id="overlay">
    <div class="overlay-nav">
        <button class="back-btn" onclick="closeMe()" style="background:none; border:1px solid #333; color:white; padding:5px 15px; cursor:pointer;">← VOLVER</button>
        <span class="nav-tag" id="overlay-cat"></span>
    </div>
    <div class="detail-wrap">
        <div id="overlay-content" class="detail-grid"></div>
    </div>
</div>

            ml: 'https://www.mercadolibre.com.mx/audifonos-inalambricos-cancelacion-activa-de-ruido-anc-enc-bluetooth-in-ear-auriculares-llamadas-en-alta-definicion-sonido-de-musica-superior-manos-libres-para-gamer-y-deportivos-imenso-ims-e2010/p/MLM57800182?pdp_filters=item_id%3AMLM4128687322',
            desc: 'Revolución Antirruido con ANC/ENC Dual de -25dB. Certificación Dolby Atmos® para una experiencia de cine.',
            specs: ['ANC + ENC (-25dB)','Certificación Dolby Atmos®','Carga Inalámbrica + USB-C','Diseño Anatómico (4.2g)']
        },
        {
            id: 4, cat: 'AUDÍFONOS', catKey: 'audifonos',

            ml: 'https://www.mercadolibre.com.mx/audifonos-inalambricos-sonido-estereo-para-gamer-y-deportivos-open-ear-auriculares-bluetooth-54-con-microfono-manos-libres-imenso-ims-e2011-negro/p/MLM56677181?pdp_filters=item_id%3AMLM4101924708',
            desc: 'Audio Abierto Inteligente. Diseño no intraural para máximo confort y seguridad al aire libre. Resistente a sudor IPX5.',

            ml: 'https://www.mercadolibre.com.mx/audifonos-bluetooth-54-inalambricos-con-diseno-ergonomico-3d-auriculares-microfono-hd-diafragma-compuesto-cancelacion-inteligente-llamadas-claras-imenso-ims-e2012-manos-libres-hifi/p/MLM57971788?pdp_filters=item_id%3AMLM4129658652',

        {

            specs: ['Autonomía 40h Totales','Tecnología Air Conduction','Protección Auditiva Health Ear','Carga Rápida (10min = 2h)']

        },
        {
            id: 9, cat: 'POWER', catKey: 'power',

        },
        {
            id: 10, cat: 'POWER', catKey: 'power',
            name: 'POWERBANK 10K', sku: 'C4014', price: '$480', img: 'c4014.png',
            ml: 'https://www.mercadolibre.com.mx/power-bank-bateria-portatil-10000mah-carga-super-rapida-color-negro/p/MLM63778255?pdp_filters=item_id%3AMLM2660480085',
            desc: 'Ultra compacta del tamaño de una tarjeta. Portabilidad máxima con 10,000mAh y cables integrados Lightning/Type-C.',
            specs: ['10,000 mAh Compact','Cables Integrados','Protección Contra Sobrecarga','Peso Pluma']
        },
        {
            id: 11, cat: 'BOCINAS', catKey: 'bocinas',
            name: 'BOCINA MAGNÉTICA', sku: 'S1048', price: '$199', img: 's1048.png',
            ml: 'https://www.mercadolibre.com.mx/mini-bocina-bluetooth-magnetica-subwoofer-altavoz-imenso-color-negro/p/MLM58592445?pdp_filters=item_id%3AMLM2506411423',
            desc: 'Fiesta Magnética. Equipada con imanes de neodimio N52 Pro para adherirse a cualquier teléfono. Luces RGB futuristas.',
            specs: ['Imán Neodimio N52 Pro','Luces RGB 10M Colores','Sonido TWS 360°','Funciona como Soporte']
        }
    ];

    function draw(list) {
        document.getElementById('grid').innerHTML = list.map(p => `
            <div class="product-card" onclick="openMe(${p.id})">
                <span class="cat-badge">${p.cat}</span>
                <div class="product-img-wrap">
                    <img src="${p.img}" class="product-img" onerror="this.src='https://via.placeholder.com/200x200/111/fff?text=${p.sku}'">
                </div>
                <div class="product-sku">IMS-${p.sku}</div>
                <div class="product-name">${p.name}</div>
                <div style="margin-top:10px;"><span class="product-price">${p.price}</span></div>
            </div>
        `).join('');
    }

    function filter(c, b) {
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        draw(c === 'todos' ? data : data.filter(x => x.catKey === c));
    }

    function openMe(id) {
        const p = data.find(x => x.id === id);
        document.getElementById('overlay-cat').textContent = `IMS-${p.sku} — ${p.cat}`;
        document.getElementById('overlay-content').innerHTML = `
            <div class="detail-img-wrap"><img src="${p.img}" class="detail-img"></div>
            <div class="detail-info">
                <h1 class="detail-name">${p.name}</h1>
                <div class="detail-price">${p.price}</div>
                <p class="detail-desc">${p.desc}</p>
                <ul class="specs-list">${p.specs.map(s => `<li>${s}</li>`).join('')}</ul>
                <a href="${p.ml}" target="_blank" class="buy-now">🛒 COMPRAR EN MERCADO LIBRE</a>
            </div>
        `;
        document.getElementById('overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';
        history.pushState({ view: 'product' }, '');
    }

    function closeMe() {
        document.getElementById('overlay').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    window.onpopstate = () => closeMe();
    draw(data);
</script>
</body>
</html>
